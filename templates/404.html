{% extends "base.html" %}

{% block title %}Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center h-full pt-32 text-center">
    <div class="text-brand-500 text-7xl mb-4">
        <i class="ph-fill ph-warning-circle"></i>
    </div>
    <h1 class="text-5xl font-bold text-white tracking-tight mb-2">404</h1>
    <p class="text-xl text-gray-400 mb-8">Route not found in system coordinates.</p>
    <a href="{{ url_for('index') }}" class="bg-surface-800 border border-gray-700 text-gray-300 hover:text-white px-6 py-2 rounded-md font-medium transition-colors">
        Return to Command Center
    </a>
</div>
{% endblock %}
