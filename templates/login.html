<!DOCTYPE html>
<html lang="en" class="antialiased bg-surface-900 text-gray-100 h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' },
                        surface: { 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8 bg-surface-900">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center text-brand-500 text-5xl mb-4">
            <i class="ph-fill ph-hospital"></i>
        </div>
        <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-white">Sign in to Hospital OS</h2>
        <p class="mt-2 text-center text-sm text-gray-400">
            Secure command center access
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-surface-800 py-8 px-4 shadow-xl border border-gray-800 sm:rounded-lg sm:px-10">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 p-3 rounded bg-red-500/10 text-red-400 border border-red-500/20 text-sm text-center">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="space-y-6" action="{{ url_for('auth.login') }}" method="POST">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
                    <div class="mt-1">
                        <input id="username" name="username" type="text" required class="block w-full appearance-none rounded-md border border-gray-700 bg-surface-900 px-3 py-2 placeholder-gray-500 text-white focus:border-brand-500 focus:outline-none focus:ring-brand-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" required class="block w-full appearance-none rounded-md border border-gray-700 bg-surface-900 px-3 py-2 placeholder-gray-500 text-white focus:border-brand-500 focus:outline-none focus:ring-brand-500 sm:text-sm">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-gray-700 bg-surface-900 text-brand-600 focus:ring-brand-500">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-400">Remember me</label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-brand-500 hover:text-brand-400">Forgot your password?</a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="flex w-full justify-center rounded-md border border-transparent bg-brand-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 focus:ring-offset-surface-900 transition-colors">
                        Sign in
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
