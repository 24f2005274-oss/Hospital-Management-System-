<!DOCTYPE html>
<html lang="en" class="antialiased bg-[#0a0a0a] text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hospital OS{% endblock %}</title>
    
    <!-- Custom Fonts: Rajdhani for bold technical headers, Inter for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#60a5fa',
                            500: '#3b82f6', // Electric Blue
                            600: '#2563eb',
                        },
                        surface: {
                            50: '#fafafa',
                            800: '#171717', // Slightly lighter than base for cards
                            900: '#0a0a0a', // Pure deep Medos background
                            950: '#050505',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        tech: ['Rajdhani', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    boxShadow: {
                        'neon-blue': '0 0 15px rgba(59, 130, 246, 0.5)',
                        'neon-blue-lg': '0 0 30px rgba(59, 130, 246, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Glassy glow utility */
        .glass-glow {
            background: rgba(23, 23, 23, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.05);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-surface-900 text-gray-200 selection:bg-brand-500 selection:text-white font-sans"
      x-data="{ commandPaletteOpen: false }"
      @keydown.window.prevent.ctrl.k="commandPaletteOpen = true"
      @keydown.window.prevent.meta.k="commandPaletteOpen = true">

    <!-- Sidebar (High-Energy Style) -->
    <aside class="w-64 flex-shrink-0 bg-surface-950 border-r border-[#1f1f1f] flex flex-col transition-all duration-300 z-20">
        <!-- Logo Area -->
        <a href="{{ url_for('index') }}" class="h-20 flex items-center px-6 border-b border-[#1f1f1f] hover:opacity-80 transition-opacity cursor-pointer">
            <div class="flex flex-col">
                <span class="text-2xl font-tech font-bold tracking-wider text-brand-500" style="text-shadow: 0 0 10px rgba(59,130,246,0.8);">HOSPITAL OS</span>
                <span class="text-[10px] text-brand-400 font-tech font-bold tracking-widest uppercase">Enterprise Edition</span>
            </div>
        </a>
        
        <nav class="flex-1 overflow-y-auto py-6 space-y-2 px-4">
            <!-- Active State Navigation Item -->
            <a href="{{ url_for('clinical.dashboard') }}" class="flex items-center px-4 py-3 text-sm font-bold rounded-lg bg-brand-500 text-white shadow-neon-blue transition-all group cursor-pointer">
                <i class="ph-fill ph-monitor-play mr-3 text-lg"></i>
                CLINICAL COCKPIT
            </a>
            <a href="{{ url_for('clinical.patients') }}" class="flex items-center px-4 py-3 text-sm font-semibold rounded-lg text-gray-400 hover:bg-[#1a1a1a] hover:text-white transition-all group cursor-pointer">
                <i class="ph ph-users mr-3 text-lg text-gray-500 group-hover:text-brand-400"></i>
                PATIENTS
            </a>
            <a href="{{ url_for('operations.wards') }}" class="flex items-center px-4 py-3 text-sm font-semibold rounded-lg text-gray-400 hover:bg-[#1a1a1a] hover:text-white transition-all group cursor-pointer">
                <i class="ph ph-bed mr-3 text-lg text-gray-500 group-hover:text-brand-400"></i>
                WARDS & BEDS
            </a>
            <a href="{{ url_for('operations.pharmacy') }}" class="flex items-center px-4 py-3 text-sm font-semibold rounded-lg text-gray-400 hover:bg-[#1a1a1a] hover:text-white transition-all group cursor-pointer">
                <i class="ph ph-pill mr-3 text-lg text-gray-500 group-hover:text-brand-400"></i>
                PHARMACY
            </a>
            <a href="{{ url_for('operations.system') }}" class="flex items-center px-4 py-3 text-sm font-semibold rounded-lg text-gray-400 hover:bg-[#1a1a1a] hover:text-white transition-all group mt-8 cursor-pointer">
                <i class="ph ph-gear mr-3 text-lg text-gray-500 group-hover:text-brand-400"></i>
                SYSTEM CONFIG
            </a>
        </nav>
        
        <!-- Bottom Action -->
        <div class="p-6">
            <a href="{{ url_for('auth.logout') }}" class="w-full flex items-center justify-center py-3 bg-[#121212] border border-[#2a2a2a] hover:bg-red-900/30 hover:border-red-500 hover:text-red-400 text-gray-400 font-bold text-xs tracking-widest uppercase rounded transition-all mb-4">
                <i class="ph ph-sign-out mr-2 text-lg"></i> Disconnect
            </a>
            <a href="#" class="flex items-center text-xs font-semibold text-gray-500 hover:text-white transition-colors cursor-pointer">
                <i class="ph ph-question mr-2"></i> HELP CENTER
            </a>
        </div>
    </aside>

    <!-- Main Layout -->
    <div class="flex-1 flex flex-col w-0 overflow-hidden relative">
        
        <!-- Glowing background artifact (subtle) -->
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-500/10 rounded-full blur-[120px] pointer-events-none"></div>

        <!-- Top Nav -->
        <header class="h-20 flex-shrink-0 flex items-center justify-between px-10 border-b border-[#1f1f1f] bg-surface-900/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-8 text-sm font-semibold tracking-wider text-gray-500 uppercase">
                <a href="{{ url_for('clinical.dashboard') }}" class="text-brand-500 border-b-2 border-brand-500 pb-7 pt-7 cursor-pointer hover:text-brand-400 transition-colors">Command</a>
                <a href="#" class="hover:text-white transition-colors cursor-pointer pb-7 pt-7">Timeline</a>
                <a href="#" class="hover:text-white transition-colors cursor-pointer pb-7 pt-7">Analytics</a>
            </div>
            
            <div class="flex items-center space-x-6">
                <!-- Search Bar -->
                <button @click="commandPaletteOpen = true" class="flex items-center w-64 px-4 py-2 text-xs bg-[#121212] border border-[#2a2a2a] rounded-full text-gray-400 hover:border-gray-500 hover:text-white transition-colors group cursor-pointer shadow-sm">
                    <i class="ph ph-magnifying-glass mr-2 text-gray-500 group-hover:text-brand-400"></i>
                    <span>Search Global Database...</span>
                    <div class="ml-auto flex gap-1">
                        <kbd class="px-1.5 py-0.5 text-[9px] font-mono bg-[#1a1a1a] border border-[#333] rounded text-gray-400">Ctrl</kbd>
                        <kbd class="px-1.5 py-0.5 text-[9px] font-mono bg-[#1a1a1a] border border-[#333] rounded text-gray-400">K</kbd>
                    </div>
                </button>
                
                <a href="#" class="relative cursor-pointer group">
                    <i class="ph ph-bell text-xl text-gray-400 group-hover:text-white transition-colors"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-surface-900 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                </a>
                
                <div class="h-8 w-8 rounded-full border border-brand-500 p-0.5 overflow-hidden shadow-neon-blue cursor-pointer hover:scale-105 transition-transform">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed={{ current_user.username if current_user.is_authenticated else 'Guest' }}&backgroundColor=0a0a0a" alt="Avatar" class="w-full h-full rounded-full bg-[#121212]">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 relative overflow-y-auto focus:outline-none no-scrollbar">
            <div class="p-10 max-w-7xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Command Palette (Ctrl+K) -->
    <div x-show="commandPaletteOpen" style="display: none;" class="fixed inset-0 z-50 overflow-y-auto pt-24">
        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm transition-opacity" @click="commandPaletteOpen = false"></div>
        <div class="relative mx-auto max-w-2xl bg-surface-950 border border-[#2a2a2a] rounded-xl shadow-2xl overflow-hidden transform transition-all">
            <div class="relative">
                <i class="ph ph-magnifying-glass absolute top-5 left-5 text-brand-500 text-xl"></i>
                <input type="text" class="w-full h-16 bg-transparent pl-14 pr-4 text-white placeholder-gray-600 focus:outline-none border-b border-[#2a2a2a] font-mono text-sm" 
                       placeholder="Search patients, medicines, wards... (e.g. 'Paracetamol')" 
                       hx-post="/api/search" 
                       hx-trigger="keyup changed delay:300ms" 
                       hx-target="#search-results"
                       @keydown.escape="commandPaletteOpen = false"
                       x-ref="searchInput"
                       x-init="$watch('commandPaletteOpen', val => { if(val) setTimeout(() => $refs.searchInput.focus(), 50) })">
            </div>
            <div id="search-results" class="max-h-80 overflow-y-auto p-2 no-scrollbar">
                <div class="p-6 text-center text-xs font-mono text-gray-500">
                    Awaiting query...
                </div>
            </div>
        </div>
    </div>
</body>
</html>
