{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="mb-3"><i class="fas fa-user"></i> My Profile</h1>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-edit"></i> Edit Profile</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="full_name" value="{{ patient.full_name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="{{ patient.user.email }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" name="phone" value="{{ patient.phone or '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Blood Group</label>
                        <select class="form-control" name="blood_group">
                            <option value="">Select Blood Group</option>
                            <option value="A+" {% if patient.blood_group == 'A+' %}selected{% endif %}>A+</option>
                            <option value="A-" {% if patient.blood_group == 'A-' %}selected{% endif %}>A-</option>
                            <option value="B+" {% if patient.blood_group == 'B+' %}selected{% endif %}>B+</option>
                            <option value="B-" {% if patient.blood_group == 'B-' %}selected{% endif %}>B-</option>
                            <option value="AB+" {% if patient.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                            <option value="AB-" {% if patient.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
                            <option value="O+" {% if patient.blood_group == 'O+' %}selected{% endif %}>O+</option>
                            <option value="O-" {% if patient.blood_group == 'O-' %}selected{% endif %}>O-</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="3">{{ patient.address or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Emergency Contact</label>
                        <input type="tel" class="form-control" name="emergency_contact" value="{{ patient.emergency_contact or '' }}">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
